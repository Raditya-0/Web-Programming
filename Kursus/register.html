<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar — CODA</title>
  <link rel="icon" type="image/png" href="../Asset/logo/Logo-coda.png" />
  
  
  
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Background shapes -->
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- Navbar -->
  <header class="navbar">
    <a href="index.html" class="logo">
      <div class="logo-icon" style="background:transparent;"><img src="../Asset/logo/logo-coda.png" alt="CODA Logo" style="width:100%; height:100%; object-fit:contain;" /></div>
      <span>CODA</span>
    </a>
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Kembali ke Beranda
    </a>
  </header>

  <!-- Auth area -->
  <main class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand -->
      <div class="card-brand">
        <div class="brand-icon">
          <div class="logo-icon" style="background:transparent;"><img src="../Asset/logo/logo-coda.png" alt="CODA Logo" style="width:100%; height:100%; object-fit:contain;" /></div>
        </div>
        <h1>Daftar Akun CODA</h1>
        <p>Mulai gratis dan upgrade skill-mu.</p>
      </div>

      <div class="auth-panel" style="display: block;">

        <!-- Register form -->
        <form method="post" action="#">
          <div class="field">
            <label for="reg-name">Nama Lengkap</label>
            <div class="field-wrap">
              <span class="field-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </span>
              <input type="text" id="reg-name" name="name" placeholder="Nama kamu" autocomplete="name" required />
            </div>
          </div>
          <div class="field">
            <label for="reg-email">Email</label>
            <div class="field-wrap">
              <span class="field-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </span>
              <input type="email" id="reg-email" name="email" placeholder="kamu@email.com" autocomplete="email" required />
            </div>
          </div>
          <div class="field">
            <label for="reg-password">Password</label>
            <div class="field-wrap">
              <span class="field-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input type="password" id="reg-password" name="password" placeholder="Min. 8 karakter" autocomplete="new-password" minlength="8" required />
            </div>
          </div>
          <div class="field">
            <label for="reg-confirm">Konfirmasi Password</label>
            <div class="field-wrap">
              <span class="field-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><path d="M21 12c0 4.97-4.03 9-9 9S3 16.97 3 12 7.03 3 12 3s9 4.03 9 9z"/></svg>
              </span>
              <input type="password" id="reg-confirm" name="confirm_password" placeholder="Ulangi password" autocomplete="new-password" minlength="8" required />
            </div>
          </div>
          <button type="submit" class="btn-submit">Buat Akun Gratis</button>
          
          <p class="terms-text">
            Dengan mendaftar, kamu menyetujui
            <a href="#">Syarat &amp; Ketentuan</a>.
          </p>
        </form>

        <p class="terms-text" style="font-size:0.85rem; margin-top:16px;">
          Sudah punya akun? <a href="login.html" style="font-weight:600;">Masuk di sini</a>
        </p>
      </div>

    </div>
  </main>

  <footer class="auth-footer">
    © 2026 CODA · Platform Belajar Teknologi &amp; IT #1 di Indonesia
  </footer>

</body>
</html>
