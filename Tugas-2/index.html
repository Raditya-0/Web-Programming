<!DOCTYPE html>
<html>
<head>
<style>
body {
  font-family: arial, sans-serif;
  margin: 0;
  padding: 0;
}

nav {
  background-color: #ffffff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  border-bottom: 1px solid #ddd;
}

.menu-kiri {
  color: #000000;
  text-decoration: none;
  font-family: arial, sans-serif;
  font-size: 16px;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
}

.login-kanan {
  color: #000000;
  text-decoration: none;
  font-family: arial, sans-serif;
  font-size: 16px;
  padding: 8px 16px;
  border-radius: 4px;
  cursor: pointer;
}

.menu-kiri:hover, .login-kanan:hover {
  background-color: #eeeeee;
  color: #000;
}

.content {
  padding: 20px;
}

table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 30%;
  height: 50%;
}

th {
  background-color: blue;
  color: white;
}

td, th {
  border: 1px solid #dddddd;
  text-align: left;
  padding: 8px;
}

tr:nth-child(even) {
  background-color: #dddddd;
}

#form-section {
  display: none;
}

fieldset {
  border: 1px solid #aaa;
  padding: 15px 20px;
  width: 280px;
  margin-bottom: 20px;
}

legend {
  font-weight: bold;
  padding: 0 5px;
}

.form-group {
  margin-bottom: 12px;
  display: flex;
  align-items: center;
}

.form-group label {
  width: 110px;
  font-size: 14px;
}

.form-group input[type="text"],
.form-group input[type="password"] {
  border: 1px solid #aaa;
  padding: 4px 6px;
  font-size: 14px;
  width: 150px;
}

.form-group input[type="text"]:focus,
.form-group input[type="password"]:focus {
  border-color: #5b9bd5;
  outline: none;
  box-shadow: 0 0 3px #5b9bd5;
}

.form-group.checkbox {
  align-items: center;
  gap: 6px;
}

.form-group.checkbox label {
  width: auto;
}

.btn-submit {
  background-color: #000000;
  border: 1px solid #000;
  padding: 5px 14px;
  cursor: pointer;
  font-size: 14px;
  border-radius: 2px;
  color: white;
}

.btn-submit:hover {
  background-color: #333333;
}

.btn-back {
  background-color: #e0e0e0;
  border: 1px solid #aaa;
  padding: 5px 14px;
  cursor: pointer;
  font-size: 14px;
  border-radius: 2px;
  margin-right: 6px;
}

.btn-back:hover {
  background-color: #c8c8c8;
}
</style>
</head>
<body>

<nav>
  <a class="menu-kiri" href="../Menu/index.html">Menu</a>
  <a class="login-kanan" onclick="document.getElementById('form-section').style.display='block'; document.getElementById('table-section').style.display='none';">Login</a>
</nav>

<div class="content">

  <div id="table-section">
    <h2>HTML Table</h2>
    <table>
      <tr>
        <th rowspan="2">Nama</th>
        <th colspan="3" style="text-align:center">Nilai</th>
      </tr>
      <tr>
        <th>Kimia</th>
        <th>Fisika</th>
        <th>Biologi</th>
      </tr>
      <tr>
        <td>Robby</td>
        <td>76</td>
        <td>80</td>
        <td>81</td>
      </tr>
      <tr>
        <td>Rendi</td>
        <td>84</td>
        <td>70</td>
        <td>75</td>
      </tr>
      <tr>
        <td>Alfian</td>
        <td>96</td>
        <td>70</td>
        <td>71</td>
      </tr>
    </table>
  </div>

  <div id="form-section">
    <fieldset>
      <legend>Login</legend>
      <form action="/action_page.php" method="post">
        <div class="form-group">
          <label for="username">Username:</label>
          <input type="text" id="username" name="username" placeholder="username">
        </div>
        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password">
        </div>
        <div class="form-group checkbox">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Remember me</label>
        </div>
        <button type="button" class="btn-back" onclick="document.getElementById('form-section').style.display='none'; document.getElementById('table-section').style.display='block';">&#8592; Back</button>
        <button type="submit" class="btn-submit">Login</button>
      </form>
    </fieldset>
  </div>

</div>

</body>
</html>
